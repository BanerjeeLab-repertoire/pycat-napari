name: core

# The point of this workflow is to make the scientific code verifiable WITHOUT a GUI,
# and to stop a specific set of bugs from silently returning. Every check below exists
# because the corresponding bug actually shipped:
#
#   * a `NameError` on a name that only existed as a nested function's parameter, which
#     meant the Dynamic Spatial Analysis button could never have run;
#   * an `UnboundLocalError` from a late `QSizePolicy` import, which made three widgets
#     impossible to construct;
#   * a `mask_name` read from a *sibling* nested function's locals, swallowed by an
#     `except Exception`, so ticking "Ripley's L / PCF" silently produced no results;
#   * two functions defined twice, the later silently replacing the earlier;
#   * a duplicate key in the batch replay registry;
#   * scientific modules importing napari/PyQt at module scope, so 4 of 6 science test
#     modules could not even be COLLECTED.
#
# None of these are style issues, and none of them would be caught by "does it compile".

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  core:
    name: core (no napari, no Qt, no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the SCIENTIFIC deps only
        # Deliberately NOT installing napari, PyQt5 or cellpose. If a scientific module
        # needs them to import, that is the failure this job exists to catch — the fix is
        # to move the GUI import, not to add it here.
        #
        # But the COMPUTE dependencies must be here, or the job fails for the wrong
        # reason. The first version of this workflow installed only numpy/scipy/skimage/
        # pandas, and 4 of the 13 guarded science modules could not import at all:
        # image_processing_tools needs pywavelets and SimpleITK, label_and_mask_tools and
        # feature_analysis_tools need cv2, pixel_wise_corr_analysis_tools needs matplotlib.
        # A red build caused by a missing dependency teaches nothing and trains people to
        # ignore CI. `tests/test_headless_science.py` now asserts this list stays complete.
        #
        # This list is EXACTLY the module-scope, non-optional imports of the 13 guarded
        # modules, computed from the AST rather than guessed:
        #
        #     numpy scipy scikit-image pandas matplotlib
        #     opencv-python-headless (cv2)  pywavelets (pywt)  simpleitk (SimpleITK)
        #
        # Nothing else. `torch`, `cellpose`, `numba`, `sklearn`, `aicsimageio` and the rest
        # appear in the transitive graph only through LAZY imports inside functions, so they
        # are never executed at import time and must not be installed here — numba in
        # particular carries strict numpy pins and is a needless resolution risk for a job
        # that never touches it.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy scikit-image pandas matplotlib
          pip install opencv-python-headless pywavelets simpleitk
          pip install pytest pytest-cov ruff
          # PyCAT uses a SRC-LAYOUT (src/pycat/), so `import pycat` does NOT work from a
          # checkout — the package must be installed. Without this, every test that
          # imports pycat fails with ModuleNotFoundError, which is exactly what happened:
          # all 13 `test_module_actually_imports` cases failed, including ones that need
          # nothing but numpy, and coverage reported "Module pycat was never imported".
          #
          # `--no-deps` is essential. A plain `pip install -e .` would pull in the
          # pyproject dependencies — napari, pyqt5, torch, cellpose — and defeat the
          # entire purpose of a headless job. This installs PyCAT itself and nothing else;
          # its compute dependencies are the explicit list above.
          pip install --no-deps -e .

      - name: Ruff — correctness rules (ADVISORY until first seen green)
        # This subset is where every rule has caught a real, shipped bug here:
        #
        #   F821 undefined name           -> `progress_emit`, `mask_name`
        #   F823 local used before assign -> the `QSizePolicy` UnboundLocalError
        #   F811 redefinition             -> duplicate run_expand_labels / resolver
        #   F601 repeated dict key        -> duplicate batch-registry step
        #   B006 mutable default argument
        #   B023 loop variable in a closure (the classic Qt-callback bug)
        #   B904 raise-without-from in except (destroys the original traceback)
        #
        # It is ADVISORY (`|| true`) for now, deliberately. Ruff could not be installed in
        # the environment where this workflow was written, so F811/F601/B006/B904 were
        # verified against a hand-written AST re-implementation and F821/F823/B023 against
        # the guard tests below — but real Ruff has edge cases those approximations do not.
        #
        # Staking the build on a step that has never actually been RUN is how you get a red
        # pipeline that teaches nothing. Once this step is observed green in a real run,
        # delete the `|| true` and it becomes blocking. The AST guards below already cover
        # the same bug classes and ARE blocking, so nothing is unguarded in the meantime.
        run: |
          ruff check src \
            --select F821,F823,F601,F811,B006,B023,B904 \
            --output-format=github || true

      - name: Ruff — unused locals (ADVISORY — do not auto-fix)
        # F841 currently reports ~34 findings, and the audit is right that they must be
        # reviewed individually rather than deleted. Several sit in stateful loading and
        # time-series code (`from_meta`, `is_lazy`, `ndim`, `strategy_dd`,
        # `otsu_classes_spin`), where an unused local may be the RESIDUE of logic that was
        # partially removed while downstream code still behaves as if it existed. The
        # question for each is not "is it used?" but "was something meant to use it?".
        # Reported, never auto-fixed, and does not fail the build until triaged.
        run: ruff check src --select F841 --output-format=github || true

      - name: Ruff — style (advisory, never fails the build)
        run: ruff check src || true

      - name: Guards — undefined names, use-before-import, duplicate definitions
        # These run without importing anything: they are pure AST checks, so they work
        # even for modules whose heavy dependencies are absent.
        run: |
          pytest tests/test_no_undefined_names.py -v

      - name: Guards — scientific modules must import with no GUI
        run: |
          pytest tests/test_headless_science.py -v

      - name: Core scientific tests
        # The numerical kernels — FRAP fitting, VPT/viscosity, colocalization
        # coefficients, partition, image transforms — must all be verifiable here.
        #
        # NO `|| pytest tests/` FALLBACK. The first version had one, as a hedge in case
        # the `core` marker was not wired up. It was: `pytest -m core` collected almost
        # nothing, the `||` fired, and the fallback then collected the napari-dependent
        # tests (test_central_manager.py) in an environment with no napari — so the build
        # went red for a reason that had nothing to do with the code.
        #
        # A "just in case" fallback turns a clean signal into a confusing one. If the
        # marker selects nothing, that is a fact worth surfacing, not papering over.
        #
        # `--cov` is deliberately NOT used here. The `core` marker currently selects only
        # the two guard files, so a coverage report would be near-zero and meaningless —
        # and pytest-cov then emits "No data was collected" warnings that look like
        # failures. Coverage is worth adding when the numerical kernels themselves carry
        # the marker; until then it is noise.
        #
        # `--exitfirst` is off on purpose: when this breaks, seeing ALL the failures at
        # once is what told us the real cause (all 13 failing, including numpy-only
        # modules, meant `pycat` itself was not importable — not a missing dependency).
        run: |
          pytest -m core -v
